<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f1b3a"/>
      <stop offset="100%" stop-color="#3b2f6e"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4fd1c5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)"/>

  <!-- pulse waveform -->
  <polyline
    points="14,72 34,72 42,56 52,92 62,40 72,84 82,72 114,72"
    fill="none"
    stroke="url(#pulse)"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- AI letters -->
  <g font-family="-apple-system, Helvetica Neue, Arial, sans-serif" font-weight="800" fill="#ffffff">
    <text x="64" y="40" text-anchor="middle" font-size="28" letter-spacing="2">AI</text>
  </g>
</svg>
